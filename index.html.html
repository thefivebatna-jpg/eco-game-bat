<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حارس المستقبل | المنصة البيئية المتطورة</title>
    <!-- Meta tags for link sharing -->
    <meta name="description" content="لعبة بيئية تفاعلية لإنقاذ الكوكب">
    <meta property="og:title" content="حارس المستقبل">
    <meta property="og:description" content="هل يمكنك تنقية الكوكب من التلوث؟ العب الآن!">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #020617;
            color: #f8fafc;
            overflow: hidden;
            margin: 0;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        @media (min-width: 768px) {
            #game-container {
                width: 95%;
                height: 85vh;
                border-radius: 40px;
                border: 2px solid rgba(16, 185, 129, 0.3);
                box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        .neo-button {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .neo-button:active {
            transform: scale(0.95);
        }

        .score-text {
            background: linear-gradient(to bottom, #fff, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.5));
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div id="stars-container"></div>

        <div id="game-container">
            <!-- UI Header -->
            <div class="absolute top-4 left-4 right-4 flex justify-between items-start z-30 pointer-events-none">
                <div class="glass-panel px-4 py-2 text-center pointer-events-auto">
                    <p class="text-[10px] uppercase tracking-wider text-emerald-400 font-bold">نقاط النقاء</p>
                    <h2 id="score" class="text-3xl font-black score-text">٠</h2>
                </div>

                <div class="flex flex-col items-center gap-2 pointer-events-auto">
                    <div class="glass-panel px-3 py-2 flex items-center gap-3">
                        <div class="text-right">
                            <p class="text-[10px] text-rose-400 font-bold uppercase">مستوى التلوث</p>
                            <div class="w-32 md:w-48 h-2.5 bg-slate-800 rounded-full mt-1 overflow-hidden border border-white/5">
                                <div id="pollution-bar" class="h-full bg-gradient-to-r from-emerald-500 to-rose-500 transition-all duration-300" style="width: 0%"></div>
                            </div>
                        </div>
                        <span id="pollution-percent" class="text-lg font-bold text-white">٠٪</span>
                    </div>
                </div>
            </div>

            <canvas id="game-canvas"></canvas>

            <!-- Menus -->
            <div id="ui-overlay" class="absolute inset-0 z-40 flex items-center justify-center p-6 transition-all duration-500">
                <div class="glass-panel max-w-lg w-full p-8 md:p-10 text-center border-emerald-500/30 shadow-2xl">
                    <div class="mb-6 inline-block p-4 rounded-full bg-emerald-500/10 text-emerald-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C10 14.52 12 13 13 12"/></svg>
                    </div>
                    <h1 id="ui-title" class="text-4xl md:text-5xl font-black mb-4 text-white">واحة المستقبل</h1>
                    <p id="ui-desc" class="text-slate-400 mb-8 text-base md:text-lg">أهلاً بك في مهمة إنقاذ الكوكب. اجمع النفايات وحوّلها إلى طاقة نقية لبناء واحتك الخضراء.</p>
                    <button id="start-btn" class="neo-button w-full py-4 rounded-2xl text-xl font-black text-white uppercase tracking-widest">ابدأ الرحلة</button>
                </div>
            </div>

            <!-- Toast Notifications -->
            <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 opacity-0 transition-all duration-300 pointer-events-none z-50">
                <div id="toast-inner" class="bg-emerald-500 text-white px-8 py-3 rounded-full font-bold shadow-2xl flex items-center gap-3">
                    <span id="toast-msg">رائع! +10</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const pollutionBar = document.getElementById('pollution-bar');
        const pollutionText = document.getElementById('pollution-percent');
        const overlay = document.getElementById('ui-overlay');
        const startBtn = document.getElementById('start-btn');
        const uiTitle = document.getElementById('ui-title');
        const uiDesc = document.getElementById('ui-desc');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-msg');

        let score = 0;
        let pollution = 0;
        let gameActive = false;
        let items = [];
        let particles = [];
        let lastSpawn = 0;
        let animationId = null;

        function createStars() {
            const container = document.getElementById('stars-container');
            container.innerHTML = '';
            for(let i=0; i<60; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                container.appendChild(star);
            }
        }
        createStars();

        const itemTypes = [
            { char: '🥤', color: '#fbbf24', points: 10, damage: 5 },
            { char: '🔋', color: '#a855f7', points: 25, damage: 15 },
            { char: '📦', color: '#f97316', points: 5, damage: 3 },
            { char: '🛢️', color: '#ef4444', points: 40, damage: 20 }
        ];

        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class GameItem {
            constructor() {
                const type = itemTypes[Math.floor(Math.random() * itemTypes.length)];
                this.x = Math.random() * (canvas.width - 80) + 40;
                this.y = -60;
                this.type = type;
                this.size = canvas.width < 500 ? 45 : 55;
                this.speed = Math.random() * 1.5 + 2 + (score / 2000);
                this.rotation = 0;
                this.rotVel = (Math.random() - 0.5) * 0.05;
                this.alive = true;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.type.color;
                ctx.font = `${this.size}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.type.char, 0, 0);
                ctx.restore();
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotVel;
                if (this.y > canvas.height + 60) {
                    this.alive = false;
                    updatePollution(this.type.damage);
                }
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 4 + 2;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1.0;
                this.decay = Math.random() * 0.04 + 0.02;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
        }

        function updatePollution(val) {
            if (!gameActive) return;
            pollution = Math.min(100, pollution + val);
            pollutionBar.style.width = pollution + '%';
            pollutionText.innerText = Math.floor(pollution) + '٪';
            if (pollution >= 100) gameOver();
        }

        function showToast(msg, isBonus = true) {
            toastMsg.innerText = msg;
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, -20px)';
            const inner = document.getElementById('toast-inner');
            inner.className = isBonus ? 
                'bg-emerald-500 text-white px-8 py-3 rounded-full font-bold shadow-2xl flex items-center gap-3' : 
                'bg-rose-500 text-white px-8 py-3 rounded-full font-bold shadow-2xl flex items-center gap-3';
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 0)';
            }, 2000);
        }

        function handleInput(clientX, clientY) {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const mx = clientX - rect.left;
            const my = clientY - rect.top;

            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                const dist = Math.hypot(mx - item.x, my - item.y);
                if (dist < item.size * 0.8) {
                    score += item.type.points;
                    scoreEl.innerText = score.toLocaleString('ar-EG');
                    for(let j=0; j<12; j++) particles.push(new Particle(item.x, item.y, item.type.color));
                    items.splice(i, 1);

                    if (score > 0 && score % 300 === 0) {
                        pollution = Math.max(0, pollution - 10);
                        updatePollution(0);
                        showToast("مكافأة تنقية! -١٠٪ تلوث");
                    }
                    return;
                }
            }
        }

        canvas.addEventListener('mousedown', (e) => handleInput(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});

        function drawBackground() {
            ctx.fillStyle = 'rgba(16, 185, 129, 0.02)';
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            ctx.quadraticCurveTo(canvas.width/2, canvas.height - 120, canvas.width, canvas.height);
            ctx.fill();

            const treeCount = Math.min(10, Math.floor(score / 200));
            for(let i=0; i<treeCount; i++) {
                drawTree(50 + (i * (canvas.width/11)), canvas.height - 10);
            }
        }

        function drawTree(x, y) {
            ctx.save();
            ctx.translate(x, y);
            const sway = Math.sin(Date.now() / 1000) * 0.04;
            ctx.rotate(sway);
            ctx.fillStyle = '#3d2b1f';
            ctx.fillRect(-3, -12, 6, 12);
            ctx.fillStyle = '#10b981';
            ctx.beginPath();
            ctx.moveTo(0, -40);
            ctx.lineTo(-18, -12);
            ctx.lineTo(18, -12);
            ctx.fill();
            ctx.restore();
        }

        function update(time) {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();

            if (time - lastSpawn > Math.max(300, 1500 - (score/1.5))) {
                items.push(new GameItem());
                lastSpawn = time;
            }

            items = items.filter(item => {
                item.update();
                item.draw();
                return item.alive;
            });

            particles = particles.filter(p => {
                p.update();
                p.draw();
                return p.life > 0;
            });

            animationId = requestAnimationFrame(update);
        }

        function startGame() {
            if (animationId) cancelAnimationFrame(animationId);
            score = 0;
            pollution = 0;
            items = [];
            particles = [];
            scoreEl.innerText = '٠';
            updatePollution(0);
            gameActive = true;
            
            overlay.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                if (gameActive) overlay.classList.add('hidden');
            }, 500);
            
            lastSpawn = performance.now();
            animationId = requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false;
            if (animationId) cancelAnimationFrame(animationId);
            
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0', 'pointer-events-none');
                uiTitle.innerText = "احتاج الكوكب للمساعدة!";
                uiTitle.style.color = "#ef4444";
                uiDesc.innerHTML = `لقد تلوث الهواء بالكامل.<br>نقاط النقاء التي جمعتها: <span class="text-emerald-400 font-bold">${score}</span>`;
                startBtn.innerText = "أعد المحاولة";
            }, 10);
        }

        startBtn.addEventListener('click', startGame);

    </script>
</body>
</html>
